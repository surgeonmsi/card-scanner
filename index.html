<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="명함 스캐너">
<title>명함 스캐너</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --border: #E5E3DC; --border-med: #D0CEC5;
    --text: #1A1917; --text-sub: #6B6963; --text-hint: #A8A49E;
    --accent-bg: #1A1917; --accent-fg: #FFFFFF;
    --green: #2D6A4F; --green-bg: #EAF4EE; --green-border: #A8D5BC;
    --amber: #92400E; --amber-bg: #FEF3C7;
    --radius: 14px; --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110; --surface: #1C1C1A; --border: #2A2A27; --border-med: #3A3A36;
      --text: #F0EDE6; --text-sub: #8A8880; --text-hint: #4A4A46;
      --accent-bg: #F0EDE6; --accent-fg: #111110;
      --green: #4CAF7D; --green-bg: #0D2318; --green-border: #1A4D30;
      --amber: #D97706; --amber-bg: #2D1E00;
    }
  }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--text); overflow-x: hidden; }
  #app { min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: 50px; }

  .header {
    padding: 52px 20px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .header-icon { width: 42px; height: 42px; background: var(--accent-bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

  /* Tab bar */
  .tab-bar {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 10;
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; border: none; background: transparent;
    font-size: 13px; font-weight: 500; color: var(--text-hint); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

  .screen { display: none; padding: 16px 20px; }
  .screen.active { display: block; }

  /* Camera area */
  .camera-zone {
    position: relative; border-radius: var(--radius); overflow: hidden;
    background: #000; aspect-ratio: 4/3; width: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  #camera-preview {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .camera-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: white; font-size: 13px; opacity: 0.7;
  }
  .camera-overlay-icon { font-size: 40px; }

  #capture-canvas { display: none; }

  .shutter-row {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-top: 16px;
  }
  .shutter-btn {
    width: 68px; height: 68px; border-radius: 50%;
    border: 4px solid var(--border-med);
    background: var(--surface);
    font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  .shutter-btn:active { transform: scale(0.93); }
  .shutter-btn.primary {
    width: 76px; height: 76px;
    background: var(--accent-bg); border-color: var(--accent-bg);
    font-size: 32px;
  }

  .or-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 14px 0; color: var(--text-hint); font-size: 12px;
  }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Upload button */
  .upload-btn {
    width: 100%; padding: 13px;
    border: 1px solid var(--border-med); border-radius: var(--radius-sm);
    background: var(--surface); font-size: 14px; color: var(--text);
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    position: relative; overflow: hidden;
  }
  .upload-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* Preview */
  #preview-img {
    width: 100%; border-radius: var(--radius); object-fit: contain;
    max-height: 200px; background: #000; display: none;
  }

  /* OCR status */
  .ocr-status {
    display: none; margin-top: 10px; padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text-sub);
    align-items: center; gap: 10px;
  }
  .ocr-status.show { display: flex; }
  .spinner {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--border-med); border-top-color: var(--text);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ocr-progress-bar {
    height: 3px; background: var(--border); border-radius: 99px;
    margin-top: 8px; overflow: hidden; display: none;
  }
  .ocr-progress-bar.show { display: block; }
  .ocr-progress-fill {
    height: 100%; background: var(--text); border-radius: 99px;
    transition: width 0.3s; width: 0%;
  }

  /* Paste tab */
  .paste-area {
    width: 100%; min-height: 140px; padding: 14px;
    background: var(--surface); border: 1.5px dashed var(--border-med);
    border-radius: var(--radius); font-size: 14px; color: var(--text);
    font-family: inherit; resize: vertical; outline: none; line-height: 1.6;
  }
  .paste-area:focus { border-color: var(--text); }
  .paste-area::placeholder { color: var(--text-hint); }

  /* Buttons */
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius); border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.15s, transform 0.1s; letter-spacing: -0.2px; margin-top: 10px;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent-bg); color: var(--accent-fg); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border-med); }
  .btn-save { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

  /* Result card */
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg); }
  .avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--accent-bg); color: var(--accent-fg); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .field-list { padding: 4px 0; }
  .field-item { display: flex; align-items: flex-start; gap: 12px; padding: 9px 16px; border-bottom: 1px solid var(--border); }
  .field-item:last-child { border-bottom: none; }
  .field-icon { width: 30px; height: 30px; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 2px; }
  .field-body { flex: 1; min-width: 0; }
  .field-label { font-size: 10px; color: var(--text-hint); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .field-input { width: 100%; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); font-family: inherit; padding: 0; }
  .field-input:focus { color: var(--green); }
  .name-input { border: none; outline: none; background: transparent; font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; width: 100%; font-family: inherit; }

  .confidence { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 4px 10px; border-radius: 999px; font-weight: 500; margin-top: 10px; }
  .confidence.high { background: var(--green-bg); color: var(--green); }
  .confidence.low { background: var(--amber-bg); color: var(--amber); }

  /* History */
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .history-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text-sub); flex-shrink: 0; }
  .history-info { flex: 1; min-width: 0; }
  .history-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .history-org { font-size: 12px; color: var(--text-sub); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-date { font-size: 11px; color: var(--text-hint); flex-shrink: 0; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .tip-box { background: var(--amber-bg); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--amber); margin-bottom: 12px; line-height: 1.5; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-icon">🪪</div>
    <div>
      <h1>명함 스캐너</h1>
      <p>카메라로 촬영하거나 텍스트 붙여넣기</p>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('camera')">📷 카메라</button>
    <button class="tab-btn" onclick="switchTab('paste')">📋 텍스트</button>
    <button class="tab-btn" onclick="switchTab('result')" id="tab-result" style="display:none">✅ 결과</button>
    <button class="tab-btn" onclick="switchTab('history')">🗂 내역</button>
  </div>

  <!-- Camera Tab -->
  <div id="screen-camera" class="screen active">
    <div class="tip-box">
      💡 처음 사용 시 언어 데이터 로딩에 10~20초 정도 걸릴 수 있어요
    </div>

    <div class="camera-zone" id="camera-zone">
      <video id="camera-preview" autoplay playsinline muted></video>
      <div class="camera-overlay" id="camera-overlay">
        <div class="camera-overlay-icon">📷</div>
        <div>아래 버튼을 눌러 카메라 시작</div>
      </div>
    </div>

    <canvas id="capture-canvas"></canvas>
    <img id="preview-img" alt="촬영된 명함" />

    <div class="shutter-row">
      <button class="shutter-btn" onclick="toggleCamera()" id="cam-toggle-btn" title="카메라 시작/정지">🎥</button>
      <button class="shutter-btn primary" onclick="capturePhoto()" id="shutter-btn" title="촬영">📸</button>
      <button class="shutter-btn upload-btn" title="갤러리에서 선택">
        🖼
        <input type="file" accept="image/*" onchange="handleFileUpload(this)" />
      </button>
    </div>

    <div class="ocr-status" id="ocr-status">
      <div class="spinner"></div>
      <span id="ocr-status-text">OCR 준비 중...</span>
    </div>
    <div class="ocr-progress-bar" id="ocr-progress-bar">
      <div class="ocr-progress-fill" id="ocr-progress-fill"></div>
    </div>
  </div>

  <!-- Paste Tab -->
  <div id="screen-paste" class="screen">
    <div class="tip-box">
      📸 카메라 앱으로 명함 촬영 → 사진에서 텍스트 길게 누르기 → 전체 선택 → 복사 후 붙여넣기
    </div>
    <textarea class="paste-area" id="paste-input" placeholder="여기에 명함 텍스트를 붙여넣으세요...

예시:
홍길동
마케팅팀 부장
(주)한국기업
010-1234-5678
hong@company.co.kr
서울시 강남구 테헤란로 123"></textarea>
    <button class="btn btn-primary" id="parse-btn" onclick="parsePasteText()" disabled>✨ 자동 분석하기</button>
  </div>

  <!-- Result Tab -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="card-header">
        <div class="avatar" id="res-avatar">?</div>
        <div style="flex:1;min-width:0">
          <input class="name-input" id="res-name" placeholder="이름" />
          <div style="font-size:13px;color:var(--text-sub);margin-top:2px" id="res-sub">—</div>
        </div>
      </div>
      <div class="field-list">
        <div class="field-item"><div class="field-icon">🏢</div><div class="field-body"><div class="field-label">소속</div><input class="field-input" id="f-company" placeholder="—" /></div></div>
        <div class="field-item"><div class="field-icon">💼</div><div class="field-body"><div class="field-label">직책</div><input class="field-input" id="f-position" placeholder="—" /></div></div>
        <div class="field-item"><div class="field-icon">📞</div><div class="field-body"><div class="field-label">전화</div><input class="field-input" id="f-phone" placeholder="—" type="tel" /></div></div>
        <div class="field-item"><div class="field-icon">📱</div><div class="field-body"><div class="field-label">휴대폰</div><input class="field-input" id="f-mobile" placeholder="—" type="tel" /></div></div>
        <div class="field-item"><div class="field-icon">📠</div><div class="field-body"><div class="field-label">팩스</div><input class="field-input" id="f-fax" placeholder="—" type="tel" /></div></div>
        <div class="field-item"><div class="field-icon">✉️</div><div class="field-body"><div class="field-label">이메일</div><input class="field-input" id="f-email" placeholder="—" type="email" /></div></div>
        <div class="field-item"><div class="field-icon">🌐</div><div class="field-body"><div class="field-label">웹사이트</div><input class="field-input" id="f-website" placeholder="—" /></div></div>
        <div class="field-item"><div class="field-icon">📍</div><div class="field-body"><div class="field-label">주소</div><input class="field-input" id="f-address" placeholder="—" /></div></div>
      </div>
    </div>
    <div id="confidence-badge"></div>
    <button class="btn btn-save" onclick="saveVCF()">📇 연락처에 저장하기 (VCF)</button>
    <button class="btn btn-secondary" onclick="copyText()">📋 텍스트로 복사</button>
    <button class="btn btn-secondary" onclick="resetAll()">🔄 다른 명함 스캔하기</button>
  </div>

  <!-- History Tab -->
  <div id="screen-history" class="screen">
    <div class="section-title">최근 저장 명함</div>
    <div id="history-list"><div style="text-align:center;padding:40px 0;color:var(--text-hint);font-size:13px">아직 저장된 명함이 없어요</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ── Utils ──────────────────────────────────
function $(id) { return document.getElementById(id); }
function showToast(msg, dur=2200) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function getInitials(name) {
  if (!name) return '?';
  const clean = name.replace(/\(.*?\)/g,'').trim();
  const parts = clean.split(/\s+/).filter(Boolean);
  if (!parts.length) return '?';
  if (parts.length === 1) return parts[0].charAt(0);
  return parts[0].charAt(0) + parts[parts.length-1].charAt(0);
}

// ── Tabs ───────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('screen-'+name).classList.add('active');
  const btns = document.querySelectorAll('.tab-btn');
  const map = {camera:0, paste:1, result:2, history:3};
  if (map[name] !== undefined) btns[map[name]].classList.add('active');
}

// ── Camera ─────────────────────────────────
let stream = null;
let cameraOn = false;

async function toggleCamera() {
  if (cameraOn) {
    stopCamera();
  } else {
    await startCamera();
  }
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const video = $('camera-preview');
    video.srcObject = stream;
    $('camera-overlay').style.display = 'none';
    $('preview-img').style.display = 'none';
    video.style.display = 'block';
    $('cam-toggle-btn').textContent = '⏹';
    cameraOn = true;
  } catch(e) {
    showToast('카메라 접근 권한이 필요해요');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  $('camera-preview').srcObject = null;
  $('camera-overlay').style.display = 'flex';
  $('cam-toggle-btn').textContent = '🎥';
  cameraOn = false;
}

function capturePhoto() {
  const video = $('camera-preview');
  if (!cameraOn || !video.videoWidth) { showToast('먼저 카메라를 시작해주세요'); return; }
  const canvas = $('capture-canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const img = $('preview-img');
  img.src = dataUrl;
  img.style.display = 'block';
  stopCamera();
  runOCR(canvas);
}

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = $('preview-img');
    img.src = e.target.result;
    img.style.display = 'block';
    $('camera-overlay').style.display = 'none';
    const image = new Image();
    image.onload = () => {
      const canvas = $('capture-canvas');
      canvas.width = image.width;
      canvas.height = image.height;
      canvas.getContext('2d').drawImage(image, 0, 0);
      runOCR(canvas);
    };
    image.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── OCR ────────────────────────────────────
async function runOCR(canvas) {
  const status = $('ocr-status');
  const statusText = $('ocr-status-text');
  const progressBar = $('ocr-progress-bar');
  const progressFill = $('ocr-progress-fill');

  status.classList.add('show');
  progressBar.classList.add('show');
  progressFill.style.width = '0%';
  statusText.textContent = 'OCR 엔진 로딩 중...';

  try {
    const worker = await Tesseract.createWorker(['kor', 'eng'], 1, {
      logger: m => {
        if (m.status === 'loading tesseract core') { statusText.textContent = 'OCR 엔진 로딩 중...'; progressFill.style.width = '10%'; }
        else if (m.status === 'loading language traineddata') { statusText.textContent = '한국어 언어 데이터 로딩 중...'; progressFill.style.width = '30%'; }
        else if (m.status === 'initializing api') { statusText.textContent = '초기화 중...'; progressFill.style.width = '60%'; }
        else if (m.status === 'recognizing text') {
          statusText.textContent = `텍스트 인식 중... ${Math.round((m.progress||0)*100)}%`;
          progressFill.style.width = (60 + (m.progress||0)*38) + '%';
        }
      }
    });

    progressFill.style.width = '70%';
    statusText.textContent = '텍스트 인식 중...';

    const { data: { text } } = await worker.recognize(canvas);
    await worker.terminate();

    progressFill.style.width = '100%';
    statusText.textContent = '분석 완료!';
    setTimeout(() => { status.classList.remove('show'); progressBar.classList.remove('show'); }, 800);

    if (!text.trim()) { showToast('텍스트를 인식하지 못했어요. 다시 촬영해보세요.'); return; }

    const parsed = parseCard(text);
    renderResult(parsed);
    $('tab-result').style.display = '';
    switchTab('result');

  } catch(e) {
    status.classList.remove('show');
    progressBar.classList.remove('show');
    showToast('OCR 오류가 발생했어요. 다시 시도해주세요.');
    console.error(e);
  }
}

// ── Parser ─────────────────────────────────
function parseCard(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const result = { name:'', company:'', position:'', phone:'', mobile:'', fax:'', email:'', website:'', address:'' };

  const emailRe = /[\w.+\-]+@[\w.\-]+\.[a-zA-Z]{2,}/;
  const emailLine = lines.find(l => emailRe.test(l));
  if (emailLine) result.email = emailLine.match(emailRe)[0];

  const webRe = /(?:https?:\/\/)?(?:www\.)?[\w\-]+\.[a-zA-Z]{2,}(?:\/\S*)?/i;
  const webLine = lines.find(l => webRe.test(l) && !emailRe.test(l));
  if (webLine) { const m = webLine.match(webRe); if (m && !m[0].includes('@')) result.website = m[0]; }

  const phoneRe = /(?:0\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4}|\+?82[-.\s]?\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4})/g;
  lines.forEach(l => {
    const ms = l.match(phoneRe);
    if (!ms) return;
    ms.forEach(m => {
      const digits = m.replace(/\D/g,'');
      if (digits.length < 9) return;
      const lbl = l.toLowerCase();
      const isMobile = /^010/.test(digits.replace(/^82/,'0'));
      const isFax = /팩스|fax/i.test(lbl);
      if (isFax && !result.fax) result.fax = m.trim();
      else if (isMobile && !result.mobile) result.mobile = m.trim();
      else if (!result.phone) result.phone = m.trim();
    });
  });

  const addrRe = /(?:서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주).{2,}/;
  const addrLine = lines.find(l => addrRe.test(l) && !phoneRe.test(l) && !emailRe.test(l));
  if (addrLine) result.address = addrLine;

  const usedSet = new Set();
  lines.forEach((l,i) => {
    if (result.email && l.includes(result.email)) usedSet.add(i);
    if (result.website && l.includes(result.website.split('/')[0])) usedSet.add(i);
    if (result.address && l === result.address) usedSet.add(i);
    if (phoneRe.test(l)) usedSet.add(i);
  });

  const rem = lines.filter((_,i) => !usedSet.has(i));

  const posKw = /대표|사장|부사장|전무|상무|이사|부장|차장|과장|대리|주임|사원|팀장|본부장|실장|센터장|소장|원장|교수|박사|선임|수석|책임|매니저|디렉터|director|manager|ceo|cto|cfo|coo|vp|president/i;
  const posIdx = rem.findIndex(l => posKw.test(l));
  if (posIdx >= 0) { result.position = rem[posIdx]; rem.splice(posIdx,1); }

  const coKw = /주식회사|\(주\)|\(사\)|유한회사|합자|재단|학교|대학|병원|의원|법인|inc\.|co\.,|corp\.|ltd\.|llc/i;
  const coIdx = rem.findIndex(l => coKw.test(l));
  if (coIdx >= 0) { result.company = rem[coIdx]; rem.splice(coIdx,1); }

  const nameRe = /^[가-힣]{2,5}$|^[A-Za-z]+(?: [A-Za-z]+){0,3}$/;
  const nameIdx = rem.findIndex(l => nameRe.test(l.trim()) && l.trim().length >= 2);
  if (nameIdx >= 0) { result.name = rem[nameIdx].trim(); rem.splice(nameIdx,1); }

  if (!result.company && rem.length > 0) {
    const sorted = [...rem].sort((a,b) => b.length - a.length);
    result.company = sorted[0];
  }

  const filled = Object.entries(result).filter(([k,v]) => k !== '_confidence' && v).length;
  result._confidence = filled >= 4 ? 'high' : 'low';
  return result;
}

// ── Paste tab ──────────────────────────────
$('paste-input').addEventListener('input', function() {
  $('parse-btn').disabled = this.value.trim().length < 3;
});
function parsePasteText() {
  const text = $('paste-input').value.trim();
  if (!text) return;
  const parsed = parseCard(text);
  renderResult(parsed);
  $('tab-result').style.display = '';
  switchTab('result');
}

// ── Render ─────────────────────────────────
function renderResult(d) {
  $('res-avatar').textContent = getInitials(d.name);
  $('res-name').value = d.name || '';
  $('res-sub').textContent = [d.position, d.company].filter(Boolean).join(' · ') || '정보 없음';
  $('f-company').value  = d.company  || '';
  $('f-position').value = d.position || '';
  $('f-phone').value    = d.phone    || '';
  $('f-mobile').value   = d.mobile   || '';
  $('f-fax').value      = d.fax      || '';
  $('f-email').value    = d.email    || '';
  $('f-website').value  = d.website  || '';
  $('f-address').value  = d.address  || '';

  $('res-name').oninput = function() { $('res-avatar').textContent = getInitials(this.value); };

  const badge = $('confidence-badge');
  badge.innerHTML = d._confidence === 'high'
    ? '<span class="confidence high">✓ 높은 정확도로 추출됨</span>'
    : '<span class="confidence low">⚠️ 일부 항목을 직접 확인해주세요</span>';
}

// ── VCF ────────────────────────────────────
function saveVCF() {
  const name     = $('res-name').value;
  const company  = $('f-company').value;
  const position = $('f-position').value;
  const phone    = $('f-phone').value;
  const mobile   = $('f-mobile').value;
  const fax      = $('f-fax').value;
  const email    = $('f-email').value;
  const website  = $('f-website').value;
  const address  = $('f-address').value;

  const parts = name.trim().split(/\s+/);
  const vcf = [
    'BEGIN:VCARD','VERSION:3.0',
    `N:${parts[0]};${parts.slice(1).join(' ')};;;`,
    `FN:${name}`,
    company  ? `ORG:${company}`               : '',
    position ? `TITLE:${position}`            : '',
    phone    ? `TEL;TYPE=WORK,VOICE:${phone}` : '',
    mobile   ? `TEL;TYPE=CELL:${mobile}`      : '',
    fax      ? `TEL;TYPE=FAX:${fax}`          : '',
    email    ? `EMAIL;TYPE=WORK:${email}`     : '',
    website  ? `URL:${website}`               : '',
    address  ? `ADR;TYPE=WORK:;;${address};;;;` : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${name || 'contact'}.vcf`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);

  const hist = JSON.parse(localStorage.getItem('bc_hist') || '[]');
  hist.unshift({ name, company, position, phone, mobile, email, date: new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) });
  localStorage.setItem('bc_hist', JSON.stringify(hist.slice(0,15)));
  renderHistory();
  showToast('📇 VCF 저장 완료! 파일을 열어 연락처 앱에 추가하세요');
}

function copyText() {
  const lines = [$('res-name').value, $('f-company').value, $('f-position').value, $('f-phone').value, $('f-mobile').value, $('f-email').value].filter(Boolean).join('\n');
  navigator.clipboard.writeText(lines).then(() => showToast('📋 복사됐어요'));
}

function resetAll() {
  $('paste-input').value = '';
  $('parse-btn').disabled = true;
  $('preview-img').style.display = 'none';
  $('camera-overlay').style.display = 'flex';
  $('tab-result').style.display = 'none';
  switchTab('camera');
}

// ── History ────────────────────────────────
function renderHistory() {
  const hist = JSON.parse(localStorage.getItem('bc_hist') || '[]');
  const list = $('history-list');
  if (!hist.length) { list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-hint);font-size:13px">아직 저장된 명함이 없어요</div>'; return; }
  list.innerHTML = hist.map(h => `
    <div class="history-item">
      <div class="history-avatar">${getInitials(h.name)}</div>
      <div class="history-info">
        <div class="history-name">${h.name||'이름 없음'}</div>
        <div class="history-org">${[h.position,h.company].filter(Boolean).join(' · ')||'—'}</div>
      </div>
      <div class="history-date">${h.date||''}</div>
    </div>`).join('');
}

renderHistory();
</script>
